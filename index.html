<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>だるま日本語 - AI会話練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1B1B;
    --washi:#F7F0E3;
    --washi-card:#FFFBF2;
    --washi-dark:#EAE0C8;
    --indigo:#2B4570;
    --indigo-deep:#1B2C47;
    --vermillion:#C1440E;
    --vermillion-soft:#F6DCCB;
    --mustard:#E0A458;
    --line:#D8CBA6;
    --shadow: 0 2px 10px rgba(27,44,71,0.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 90% -10%, rgba(224,164,88,0.18), transparent 45%),
      radial-gradient(circle at -10% 110%, rgba(43,69,112,0.10), transparent 45%),
      var(--washi);
    color:var(--ink);
    font-family:'Noto Sans TC','Noto Sans JP',sans-serif;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .app{
    width:100%;
    max-width:720px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--washi-card);
    box-shadow:0 0 40px rgba(27,44,71,0.10);
    position:relative;
  }

  /* ---------- Header ---------- */
  header{
    padding:18px 20px 14px;
    background:var(--indigo-deep);
    color:var(--washi);
    border-bottom:4px solid var(--vermillion);
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size:14px 14px;
    pointer-events:none;
  }
  .header-top{display:flex; align-items:center; gap:14px; position:relative; z-index:1;}
  .title-block h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:22px; font-weight:900; margin:0; letter-spacing:1px;
    display:flex; align-items:baseline; gap:8px;
  }
  .title-block h1 small{
    font-family:'Noto Sans TC',sans-serif;
    font-size:11px; font-weight:400; color:var(--mustard); letter-spacing:2px;
  }
  .title-block p{margin:2px 0 0; font-size:12px; color:#C9D3E4; font-family:'Zen Kaku Gothic New',sans-serif;}

  .controls{
    display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; position:relative; z-index:1;
  }
  .controls select, .pill-btn{
    font-family:'Zen Kaku Gothic New','Noto Sans TC',sans-serif;
    font-size:12px;
    border:1px solid rgba(247,240,227,0.35);
    background:rgba(255,255,255,0.06);
    color:var(--washi);
    padding:6px 10px;
    border-radius:20px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .controls select{ padding-right:6px; }
  .pill-btn:hover, .controls select:hover{background:rgba(255,255,255,0.16);}
  .pill-btn.active{background:var(--mustard); color:var(--indigo-deep); border-color:var(--mustard); font-weight:700;}
  .pill-btn:active{transform:scale(0.96);}

  /* ---------- Daruma avatar ---------- */
  .avatar-wrap{
    display:flex; align-items:center; justify-content:center;
    padding:14px 0 6px;
    flex-shrink:0;
  }
  .daruma{ width:78px; height:78px; filter:drop-shadow(0 4px 6px rgba(0,0,0,0.15)); }
  .daruma .eye{ transform-origin:center; animation:blink 5.5s infinite; }
  .daruma .eye.right{ animation-delay:.15s; }
  @keyframes blink{
    0%,92%,100%{ ry:5; }
    95%{ ry:0.5; }
  }
  .daruma .mouth{ transition: d .12s ease; }
  .daruma.speaking .mouth{ animation:talk .28s infinite alternate; }
  @keyframes talk{
    from{ d:path("M -9 6 Q 0 6 9 6"); }
    to{ d:path("M -9 5 Q 0 16 9 5"); }
  }
  .status-caption{
    text-align:center; font-size:11px; color:var(--indigo); opacity:.7;
    font-family:'Zen Kaku Gothic New',sans-serif; margin-top:2px; height:14px;
  }

  /* ---------- Chat ---------- */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:10px 16px 16px;
    display:flex; flex-direction:column; gap:14px;
  }
  .msg{ max-width:82%; display:flex; flex-direction:column; gap:4px; animation:rise .25s ease; }
  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .msg.ai{ align-self:flex-start; }
  .msg.user{ align-self:flex-end; align-items:flex-end; }

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    line-height:1.9;
    font-size:16px;
    box-shadow:var(--shadow);
    word-break:break-word;
  }
  .msg.ai .bubble{
    background:var(--washi-dark);
    border-bottom-left-radius:4px;
    font-family:'Noto Sans JP',sans-serif;
  }
  .msg.user .bubble{
    background:var(--indigo);
    color:var(--washi);
    border-bottom-right-radius:4px;
    font-family:'Noto Sans JP',sans-serif;
  }
  ruby rt{
    font-size:10px; color:var(--indigo); font-family:'Noto Sans JP',sans-serif;
    transition:opacity .15s ease;
  }
  .msg.user ruby rt{ color:var(--mustard); }
  .app.no-furigana ruby rt{ display:none; }

  .zh-caption{
    font-size:12px; color:#9a8f6f; font-family:'Noto Sans TC',sans-serif; padding:0 8px;
    line-height:1.5;
  }

  /* correction card: always visible, styled like a native-speaker suggestion note */
  .correction-card{
    background:var(--washi-dark);
    border:1px solid var(--line);
    border-left:4px solid var(--mustard);
    border-radius:10px;
    padding:10px 14px;
    max-width:100%;
    box-shadow:var(--shadow);
  }
  .correction-card .label{
    font-size:11px; font-weight:700; color:#8a6a2a;
    font-family:'Zen Kaku Gothic New',sans-serif;
    display:flex; align-items:center; gap:4px; margin-bottom:4px;
  }
  .correction-card .corrected-jp{
    font-family:'Noto Sans JP',sans-serif; font-size:15.5px; line-height:1.9;
    color:var(--ink); display:block;
  }
  .correction-card .correction-explain{
    font-size:12px; color:#8a7f5f; font-family:'Noto Sans TC',sans-serif;
    margin-top:6px; padding-top:6px; border-top:1px dashed var(--line);
  }
  .correction-card ruby rt{ color:#8a6a2a; }
  .correction-card .card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .speak-btn{
    width:26px; height:26px; border-radius:50%; border:none; cursor:pointer;
    background:var(--mustard); color:var(--indigo-deep); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:transform .1s ease;
  }
  .speak-btn:active{ transform:scale(0.9); }
  .speak-btn svg{ width:13px; height:13px; }

  /* ---------- Scene banner ---------- */
  .scene-banner{
    background:var(--mustard);
    color:var(--indigo-deep);
    padding:8px 16px;
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Zen Kaku Gothic New',sans-serif; font-size:12.5px; font-weight:700;
  }
  .scene-exit-btn{
    background:rgba(27,44,71,0.12); border:none; color:var(--indigo-deep);
    font-size:11px; padding:4px 10px; border-radius:12px; cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;
  }
  .scene-exit-btn:hover{ background:rgba(27,44,71,0.22); }
  .scene-score{
    background:rgba(27,44,71,0.14); color:var(--indigo-deep);
    padding:3px 10px; border-radius:12px; font-size:11.5px; font-weight:700;
    font-family:'Zen Kaku Gothic New',sans-serif;
  }

  /* ---------- Word lookup popup ---------- */
  .word-chip{ cursor:pointer; border-bottom:1.5px dotted rgba(43,69,112,0.4); transition:background .1s ease; border-radius:3px; }
  .word-chip:hover, .word-chip:active{ background:rgba(224,164,88,0.25); }
  .msg.user .word-chip{ border-bottom-color:rgba(247,240,227,0.5); }
  .msg.user .word-chip:hover, .msg.user .word-chip:active{ background:rgba(255,255,255,0.15); }
  .word-popup{
    display:none;
    position:fixed;
    z-index:200;
    background:var(--indigo-deep);
    color:var(--washi);
    padding:6px 12px;
    border-radius:10px;
    font-size:12.5px;
    font-family:'Noto Sans TC',sans-serif;
    max-width:200px;
    box-shadow:0 6px 16px rgba(0,0,0,0.25);
    pointer-events:none;
  }

  /* ---------- Clear (level-up) modal ---------- */
  .clear-modal-overlay{
    display:none;
    position:fixed; inset:0; z-index:60;
    background:rgba(27,28,27,0.6);
    align-items:center; justify-content:center;
    padding:20px;
  }
  .clear-modal-overlay.open{ display:flex; }
  .clear-modal{
    background:var(--washi-card);
    border-radius:18px;
    max-width:380px; width:100%;
    padding:28px 24px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .clear-daruma{ font-size:44px; margin-bottom:6px; }
  .clear-modal h2{
    font-family:'Zen Maru Gothic',sans-serif; font-size:19px; color:var(--vermillion); margin:0 0 8px;
  }
  .clear-modal p{
    font-size:13px; color:#5c5040; line-height:1.7; margin:0 0 20px;
    font-family:'Noto Sans TC',sans-serif;
  }
  .clear-modal-actions{ display:flex; flex-direction:column; gap:10px; }
  .clear-btn{
    border:none; border-radius:14px; padding:12px; font-size:14px; font-weight:700;
    cursor:pointer; font-family:'Noto Sans TC',sans-serif;
  }
  .clear-btn-primary{ background:var(--vermillion); color:#fff; }
  .clear-btn-secondary{ background:var(--washi-dark); color:var(--indigo-deep); border:1px solid var(--line); }

  /* ---------- Scene picker modal ---------- */
  .scene-modal-overlay{
    display:none;
    position:fixed; inset:0; z-index:50;
    background:rgba(27,28,27,0.55);
    align-items:center; justify-content:center;
    padding:20px;
  }
  .scene-modal-overlay.open{ display:flex; }
  .scene-modal{
    background:var(--washi-card);
    border-radius:18px;
    max-width:520px; width:100%;
    max-height:85vh;
    overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
  }
  .scene-modal-header{
    position:relative;
    background:linear-gradient(135deg, var(--indigo-deep), var(--indigo));
    color:var(--washi);
    height:110px;
    overflow:hidden;
    flex-shrink:0;
  }
  .scene-banner-img{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; z-index:0;
  }
  .scene-modal-header::after{
    content:"";
    position:absolute; inset:0; z-index:1;
    background:linear-gradient(to top, rgba(27,44,71,0.88), rgba(27,44,71,0.15) 70%);
  }
  .scene-modal-header h2{
    position:absolute; left:20px; bottom:14px; z-index:2;
    font-family:'Zen Maru Gothic',sans-serif; font-size:18px; margin:0; font-weight:700;
  }
  .scene-modal-close{
    position:absolute; top:14px; right:14px; z-index:2;
    width:28px; height:28px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.18); color:var(--washi); cursor:pointer; font-size:14px;
  }
  .scene-modal-body{
    padding:16px 18px 20px;
    overflow-y:auto;
  }

  /* ---------- Level (proficiency) modal ---------- */
  .level-modal-overlay{
    display:none;
    position:fixed; inset:0; z-index:55;
    background:rgba(27,28,27,0.55);
    align-items:center; justify-content:center;
    padding:20px;
  }
  .level-modal-overlay.open{ display:flex; }
  .level-modal{
    background:var(--washi-card);
    border-radius:18px;
    max-width:420px; width:100%;
    max-height:80vh;
    overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
  }
  .level-modal-header{
    position:relative;
    background:var(--indigo-deep);
    color:var(--washi);
    padding:18px 20px;
    flex-shrink:0;
  }
  .level-modal-header h2{
    font-family:'Zen Maru Gothic',sans-serif; font-size:17px; margin:0; font-weight:700;
  }
  .level-modal-body{ padding:6px 20px 10px; overflow-y:auto; }
  .level-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 4px; border-bottom:1px solid var(--line);
    cursor:pointer; background:none; border-left:none; border-right:none; border-top:none;
    width:100%; text-align:left; font-family:'Noto Sans TC',sans-serif;
  }
  .level-item:last-child{ border-bottom:none; }
  .level-item .level-item-label{ font-size:14.5px; color:var(--ink); }
  .level-item.selected .level-item-label{ color:var(--vermillion); font-weight:700; }
  .level-item .level-check{ color:var(--vermillion); font-weight:900; font-size:16px; visibility:hidden; }
  .level-item.selected .level-check{ visibility:visible; }
  .scene-cat-title{
    font-family:'Zen Kaku Gothic New',sans-serif; font-size:12px; font-weight:700;
    color:#8a7f5f; margin:14px 0 8px; text-transform:uppercase; letter-spacing:1px;
  }
  .scene-cat-title:first-child{ margin-top:0; }
  .scene-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .scene-card{
    background:var(--washi-dark);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px;
    text-align:left;
    cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;
    transition:transform .1s ease, box-shadow .15s ease;
  }
  .scene-card:hover{ box-shadow:var(--shadow); transform:translateY(-2px); }
  .scene-card:active{ transform:scale(0.97); }
  .scene-card .scene-icon{ font-size:22px; display:block; margin-bottom:6px; }
  .scene-card .scene-title{ font-size:13.5px; font-weight:700; color:var(--ink); display:block; }
  .scene-free-card{
    background:var(--indigo); color:var(--washi); border-radius:12px; padding:12px 14px;
    text-align:left; cursor:pointer; border:none; width:100%; margin-bottom:4px;
    font-family:'Noto Sans TC',sans-serif; font-size:13.5px; font-weight:700;
  }

  .scene-back-btn{
    background:none; border:none; color:var(--indigo); cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif; font-size:12.5px; font-weight:700;
    padding:4px 0 10px; text-align:left;
  }
  .char-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .char-card{
    background:var(--washi-dark);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 10px;
    text-align:center;
    cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    transition:transform .1s ease, box-shadow .15s ease;
  }
  .char-card:hover{ box-shadow:var(--shadow); transform:translateY(-2px); }
  .char-card:active{ transform:scale(0.97); }
  .char-avatar{
    width:64px; height:64px; object-fit:cover; object-position:top center;
    border-radius:50%; border:2px solid var(--washi-card); box-shadow:0 2px 6px rgba(0,0,0,0.15);
    background:var(--washi-card);
  }
  .char-name{ font-size:13px; font-weight:700; color:var(--ink); }
  .char-tagline{ font-size:11px; color:#8a7f5f; line-height:1.4; }

  .typing-dots{ display:flex; gap:4px; padding:6px 4px; }
  .typing-dots span{
    width:6px; height:6px; border-radius:50%; background:var(--indigo); opacity:.4;
    animation:bounce 1.1s infinite;
  }
  .typing-dots span:nth-child(2){ animation-delay:.15s; }
  .typing-dots span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{transform:translateY(0); opacity:.4;} 30%{transform:translateY(-4px); opacity:1;} }

  /* ---------- Input bar ---------- */
  .input-bar{
    display:flex; align-items:flex-end; gap:8px;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:var(--washi-dark);
    border-top:1px solid var(--line);
  }
  .input-bar textarea{
    flex:1; resize:none; border:1px solid var(--line); border-radius:14px;
    padding:10px 12px; font-size:15px; font-family:'Noto Sans JP','Noto Sans TC',sans-serif;
    max-height:100px; min-height:42px; background:var(--washi-card); color:var(--ink);
  }
  .input-bar textarea:focus{ outline:2px solid var(--indigo); outline-offset:1px; }
  .round-btn{
    width:42px; height:42px; border-radius:50%; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:transform .1s ease, background .15s ease;
  }
  .round-btn:active{ transform:scale(0.92); }
  .mic-btn{ background:var(--washi-card); border:1px solid var(--line); color:var(--indigo); }
  .mic-btn.recording{ background:var(--vermillion); color:#fff; animation:pulse 1s infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(193,68,14,0.45);} 100%{box-shadow:0 0 0 10px rgba(193,68,14,0);} }
  .send-btn{ background:var(--indigo); color:var(--washi); }
  .send-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .mic-btn svg, .send-btn svg{ width:18px; height:18px; }

  .empty-hint{
    text-align:center; color:#9a8f6f; font-size:13px; margin:auto; padding:30px 20px;
    font-family:'Zen Kaku Gothic New',sans-serif; line-height:1.8;
  }
  .empty-hint b{ color:var(--indigo); }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }
</style>
</head>
<body>
<div class="app" id="app">

  <header>
    <div class="header-top">
      <div class="title-block">
        <h1>だるま日本語 <small>DARUMA NIHONGO</small></h1>
        <p>七転び八起き ・ 説き間違えながら話そう</p>
      </div>
    </div>
    <div class="controls">
      <button class="pill-btn" id="sceneOpenBtn">📚 レッスンを選ぶ</button>
      <button class="pill-btn" id="levelOpenBtn">📊 L2・初級</button>
      <button class="pill-btn active" id="furiganaToggle">振り仮名 ON</button>
      <button class="pill-btn active" id="voiceToggle">音声 ON</button>
      <button class="pill-btn" id="resetBtn">会話をリセット</button>
    </div>
  </header>

  <div class="scene-banner" id="sceneBanner" style="display:none;">
    <span class="scene-banner-label" id="sceneBannerLabel"></span>
    <span class="scene-score" id="sceneScoreLabel">🌟 0/5</span>
    <button class="scene-exit-btn" id="sceneExitBtn">✕ シーン終了</button>
  </div>

  <div class="clear-modal-overlay" id="clearModalOverlay">
    <div class="clear-modal">
      <div class="clear-daruma">🎉</div>
      <h2>クリア!よくできました!</h2>
      <p id="clearModalText">このシーンのレッスンをクリアしたよ!次に進む?それともこのまま話し続ける?</p>
      <div class="clear-modal-actions">
        <button class="clear-btn clear-btn-primary" id="clearGoNextBtn">🎯 次のシーンへ</button>
        <button class="clear-btn clear-btn-secondary" id="clearStayBtn">💬 このまま続ける</button>
      </div>
    </div>
  </div>

  <div class="word-popup" id="wordPopup"></div>

  <div class="scene-modal-overlay" id="sceneModalOverlay">
    <div class="scene-modal">
      <div class="scene-modal-header has-banner" id="sceneModalHeader">
        <img class="scene-banner-img" src="scene-banner-school.png" alt="" onerror="this.style.display='none'">
        <h2>📚 レッスンを選ぼう</h2>
        <button class="scene-modal-close" id="sceneModalClose">✕</button>
      </div>
      <div class="scene-modal-body" id="sceneModalBody"></div>
    </div>
  </div>

  <div class="level-modal-overlay" id="levelModalOverlay">
    <div class="level-modal">
      <div class="level-modal-header">
        <h2>更改熟練度級別</h2>
        <button class="scene-modal-close" id="levelModalClose">✕</button>
      </div>
      <div class="level-modal-body" id="levelModalBody"></div>
    </div>
  </div>

  <div class="avatar-wrap">
    <svg class="daruma" id="daruma" viewBox="-40 -40 80 80">
      <ellipse cx="0" cy="6" rx="34" ry="30" fill="#C1440E"/>
      <path d="M -34 20 Q 0 40 34 20 L 34 8 Q 0 26 -34 8 Z" fill="#E0A458"/>
      <ellipse cx="0" cy="-2" rx="21" ry="20" fill="#FFFBF2"/>
      <path d="M -18 -14 Q 0 -24 18 -14" stroke="#1B1B1B" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <ellipse class="eye left" cx="-8" cy="-4" rx="3.4" ry="5" fill="#1B1B1B"/>
      <ellipse class="eye right" cx="8" cy="-4" rx="3.4" ry="5" fill="#1B1B1B"/>
      <path class="mouth" d="M -9 6 Q 0 6 9 6" stroke="#1B1B1B" stroke-width="2" fill="none" stroke-linecap="round"/>

function buildSystemPrompt(){

  return `${identity}
相手は台湾の中高生・大学生で、日本語を勉強中です。以下のルールを厳守してください。

【安全に関する注意】
どんなキャラクターを演じていても、恋愛的な内容・性的な話題・不適切な発言には絶対に触れないこと。常に健全で、友達思いで、教育的に適切な会話を保つこと。

【レベル設定】
${LEVEL_DEFS[currentLevel].prompt}
${currentScene ? `
【シーン設定】
これは「${currentScene.locationLabel} ・ ${currentScene.title}」というテーマのロールプレイ会話です。次の状況設定に沿って会話を進めてください: ${currentScene.topic}
話が大きく脱線した場合は、自然にこのテーマに話を戻すよう誘導すること。
` : ''}
${currentCharacter && currentCharacter.extraRule ? `
【このキャラクター特有のルール】
${currentCharacter.extraRule}
` : ''}
【会話の基本姿勢】
- 相手の日本語に文法・語彙の間違いがあっても、まず言いたいことを推測して理解し、自然に会話を続けること。会話が止まらないようにする。
- 自分のキャラクターらしく親しみやすく、時々励ましの言葉を交える。ただし説教くさくしない。
- 返信は1〜3文程度、短く自然な会話文にする。長くなりすぎないこと。

【出力形式】
必ず次のJSON形式のみを出力すること。前置き、説明文、コードブロックの記号(バッククォート)は一切つけない。JSONのみ。

{
  "reply": [ {"text":"漢字や仮名の一部分","reading":"その部分の読み(ひらがな)か、読み不要ならnull","meaning":"その部分の簡潔な繁體中文の意味(助詞や記号の場合はnull可)"}, ... ],
  "replyZh": "replyの繁體中文訳(簡潔に、1文)",
  "userSegments": [ {"text":"...","reading":"...","meaning":"..."} , ... ],
  "correction": {
    "needsCorrection": true または false,
    "correctedSegments": [ {"text":"...","reading":"...","meaning":"..."} , ... ],
    "explanationZh": "何が間違っていたかの簡潔な繁體中文解説、1文、句読点に——(em dash)は使わない(needsCorrectionがtrueの時のみ、無ければ空配列/空文字)"
  }
}

【reply配列・correctedSegments配列・userSegments配列共通のルール】
- 全文を、漢字を含む意味の塊ごとに分割すること。漢字を含む部分には対応する読み(ひらがな)をreadingに入れる。ひらがな・カタカナ・句読点のみの部分はreading を null にする。
- 各要素の meaning には、その単語・表現の簡潔な繁體中文の意味を入れる(例:「食べます」→「吃(禮貌形)」)。「、」「。」「?」などの記号や意味を持たない断片は meaning を null にする。
- 例: 「今日は暑いですね」→ [{"text":"今日","reading":"きょう","meaning":"今天"},{"text":"は","reading":null,"meaning":"表示主題的助詞"},{"text":"暑い","reading":"あつい","meaning":"熱的"},{"text":"です","reading":null,"meaning":"是(禮貌形)"},{"text":"ね","reading":null,"meaning":"呢(尋求同意的語氣詞)"}]
- userSegments には、相手が今回送ってきた「元の文(修正前)」をそのまま同じルールで分割すること。文法が間違っていても直さずそのまま使う。もし相手のメッセージがシステム指示(丸括弧で始まる指示文など)の場合は、userSegments は空配列にしてよい。

【correctionのルール】
- 相手のメッセージに明らかな文法・語彙・助詞の誤りがあり、教える価値がある場合のみ needsCorrection を true にし、correctedSegments に自然な日本語に直した相手の文を入れる。些細な口語表現の違いなどは true にしない。
- 誤りが無ければ needsCorrection は false にし、correctedSegments は空配列、explanationZh は空文字にする。
- 相手のメッセージがシステム指示(会話を始めてくださいという指示など)の場合は、needsCorrection は必ず false にする。`;
}

function scrollToBottom(){ chatEl.scrollTop = chatEl.scrollHeight; }

function isRealValue(v){
  if(v === null || v === undefined) return false;
  const trimmed = String(v).trim();
  if(trimmed === '') return false;
  if(trimmed.toLowerCase() === 'null') return false;
  return true;
}

function renderRuby(segments){
  return segments.map(seg=>{
    const hasReading = isRealValue(seg.reading);
    const inner = hasReading
      ? `<ruby>${escapeHtml(seg.text)}<rt>${escapeHtml(seg.reading)}</rt></ruby>`
      : escapeHtml(seg.text);
    if(isRealValue(seg.meaning)){
      return `<span class="word-chip" data-meaning="${escapeHtml(seg.meaning)}">${inner}</span>`;
    }
    return inner;
  }).join('');
}
function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function callClaudeMessages(msgs){
  let response;
  try{
    response = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 3200,
        system: buildSystemPrompt(),
        messages: msgs
      })
    });
  }catch(networkErr){
    throw new Error("NETWORK_FAIL: " + networkErr.message);
  }

  const data = await response.json();

  if(!response.ok || data.error){
    const msg = (data.error && (data.error.message || data.error.type)) || ("HTTP " + response.status);
    throw new Error("API_ERROR: " + msg);
  }

  const textBlock = (data.content || []).find(c=>c.type==='text');
  if(!textBlock){
    throw new Error("NO_TEXT_BLOCK: " + JSON.stringify(data).slice(0,200));
  }
  let raw = textBlock.text;
  raw = raw.replace(/```json|```/g,'').trim();
  let parsed;
  try{
    parsed = JSON.parse(raw);
    if(!parsed.userSegments) parsed.userSegments = null;
  }catch(e){
    console.error('JSON解析失敗,原始內容:', raw);
    parsed = {
      reply:[{text: "ごめん、ちょっと文が長すぎたかも。もう少し短く言ってみてくれる？", reading:null}],
      replyZh:"抱歉,可能訊息太長處理不完整。可以試著講短一點嗎?",
      userSegments: null,
      correction:{needsCorrection:false, correctedSegments:[], explanationZh:""}
    };
  }
  return parsed;
}

async function callClaude(userText){
  const msgs = [];
  history.forEach(h=>{
    msgs.push({role: h.role, content: h.text});
  });
  msgs.push({role:'user', content:userText});
  return callClaudeMessages(msgs);
}

function pickVoiceForCharacter(voices, character){
  const jaVoices = voices.filter(v=>v.lang && v.lang.startsWith('ja'));
  if(jaVoices.length === 0) return null;
  if(!character || jaVoices.length === 1) return jaVoices[0];

  if(character.preferredVoiceNames){
    for(const name of character.preferredVoiceNames){
      const found = jaVoices.find(v=>v.name && v.name.includes(name));
      if(found) return found;
    }
  }
  const femaleMatch = jaVoices.find(v=>/female|woman|女性|kyoko|ayumi|haruka|o-ren/i.test(v.name||''));
  const maleMatch = jaVoices.find(v=>/male|man|男性|otoya|ichiro|daniel/i.test(v.name||''));
  if(character.gender === 'female' && femaleMatch) return femaleMatch;
  if(character.gender === 'male' && maleMatch) return maleMatch;
  return jaVoices[0];
}

function speak(text){
  if(!voiceOn) return;
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  const profile = (currentCharacter && currentCharacter.voiceProfile) ? currentCharacter.voiceProfile : DEFAULT_VOICE_PROFILE;
  utter.rate = profile.rate;
  utter.pitch = profile.pitch;
  const voices = window.speechSynthesis.getVoices();
  const chosenVoice = pickVoiceForCharacter(voices, currentCharacter);
  if(chosenVoice) utter.voice = chosenVoice;
  daruma.classList.add('speaking');
  statusCaption.textContent = '話しています…';
  utter.onend = ()=>{
    daruma.classList.remove('speaking');
    statusCaption.textContent='';
  };
  utter.onerror = ()=>{
    daruma.classList.remove('speaking');
    statusCaption.textContent='';
  };
  window.speechSynthesis.speak(utter);
}
// preload voices (some browsers need this)
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = ()=> window.speechSynthesis.getVoices();
}

async function handleSend(){
  const text = textInput.value.trim();
  if(!text || isProcessing) return;
  isProcessing = true;
  sendBtn.disabled = true;
  textInput.value='';
  autoResize();

  const userMsg = addUserMessage(text);
  playSendBlip();

  addTyping();
  statusCaption.textContent = '考えています…';
  try{
    const result = await callClaude(text);
    removeTyping();

    if(result.correction && result.correction.needsCorrection && result.correction.correctedSegments && result.correction.correctedSegments.length){
      const card = buildCorrectionCard(result.correction);
      chatEl.insertBefore(card, userMsg.wrap);
      scrollToBottom();
    }

    if(result.userSegments && result.userSegments.length){
      userMsg.bubble.innerHTML = renderRuby(result.userSegments);
    }

    const plainReply = (result.reply||[]).map(s=>s.text).join('');
    addAiMessage(result.reply || [{text:'…',reading:null}], result.replyZh);
    playReceiveBlip();

    if(currentScene && !sceneCleared){
      const wasCorrect = !(result.correction && result.correction.needsCorrection);
      if(wasCorrect){
        sceneScore++;
        updateSceneScoreLabel();
        if(sceneScore >= SCENE_TARGET_SCORE){
          sceneCleared = true;
          setTimeout(showClearModal, 500);
        }
      }
    }

    history.push({role:'user', text: text});
    history.push({role:'assistant', text: plainReply});

    statusCaption.textContent='';
    speak(plainReply);
  }catch(e){
    removeTyping();
    console.error('だるま日本語 API Error:', e);
    addAiMessage(
      [{text:'あれ、エラーが出た: ' + (e.message || e), reading:null}],
      '除錯用的實際錯誤訊息(可以截圖給開發者看):' + (e.message || e)
    );
    statusCaption.textContent='';
  }finally{
    isProcessing = false;
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', handleSend);
textInput.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    handleSend();
  }
});
function autoResize(){
  textInput.style.height='auto';
  textInput.style.height = Math.min(textInput.scrollHeight,100)+'px';
}
textInput.addEventListener('input', autoResize);

// ---------- Voice input ----------
let recognition = null;
let recognizing = false;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = ()=>{
    recognizing = true;
    micBtn.classList.add('recording');
    statusCaption.textContent = '聞いています…';
  };
  recognition.onresult = (e)=>{
    let transcript = '';
    for(let i=0;i<e.results.length;i++){
      transcript += e.results[i][0].transcript;
    }
    textInput.value = transcript;
    autoResize();
  };
  recognition.onerror = ()=>{
    statusCaption.textContent='';
  };
  recognition.onend = ()=>{
    recognizing = false;
    micBtn.classList.remove('recording');
    statusCaption.textContent='';
  };
  micBtn.addEventListener('click', ()=>{
    if(recognizing){
      recognition.stop();
    }else{
      window.speechSynthesis.cancel();
      recognition.start();
    }
  });
}else{
  micBtn.addEventListener('click', ()=>{
    statusCaption.textContent = 'このブラウザは音声入力に対応していません';
    setTimeout(()=> statusCaption.textContent='', 2500);
  });
}

// ---------- Toggles ----------

// ---------- Sound effects (synthesized, no audio files needed) ----------
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC) audioCtx = new AC();
  }
  return audioCtx;
}
function playTone(freq, startTime, duration, gainPeak){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}
function playSendBlip(){
  if(!voiceOn) return;
  const ctx = getAudioCtx();
  if(!ctx) return;
  const t = ctx.currentTime;
  playTone(660, t, 0.09, 0.06);
}
function playReceiveBlip(){
  if(!voiceOn) return;
  const ctx = getAudioCtx();
  if(!ctx) return;
  const t = ctx.currentTime;
  playTone(520, t, 0.09, 0.05);
  playTone(780, t + 0.07, 0.12, 0.05);
}
function playSceneChime(){
  if(!voiceOn) return;
  const ctx = getAudioCtx();
  if(!ctx) return;
  const t = ctx.currentTime;
  [523.25, 659.25, 783.99].forEach((f,i)=> playTone(f, t + i*0.11, 0.35, 0.07));
}

resetBtn.addEventListener('click', ()=>{
  if(currentSceneKey && currentCharacterId){
    startScene(currentSceneKey, currentCharacterId);
    return;
  }
  history = [];
  chatEl.innerHTML='';
  chatEl.appendChild(emptyHint);
  emptyHint.style.display='block';
  window.speechSynthesis.cancel();
});

// ---------- Scenes: step 1 (lesson picker) ----------
function renderSceneModal(){
  let html = `<button class="scene-free-card" id="sceneFreeCard">💬 自由会話(シーンなし)</button>`;
  LOCATIONS.forEach(loc=>{
    html += `<div class="scene-cat-title">${escapeHtml(loc.label)}</div><div class="scene-grid">`;
    loc.lessons.forEach(lesson=>{
      html += `<button class="scene-card" data-key="${lesson.key}">
        <span class="scene-icon">📖</span>
        <span class="scene-title">${escapeHtml(lesson.title)}</span>
      </button>`;
    });
    html += `</div>`;
  });
  sceneModalBody.innerHTML = html;

  sceneModalBody.querySelectorAll('.scene-card').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      pendingLessonKey = btn.dataset.key;
      renderCharacterPicker();
    });
  });
  document.getElementById('sceneFreeCard').addEventListener('click', ()=>{
    closeSceneModal();
    exitScene();
  });
}

// ---------- Scenes: step 2 (character picker) ----------
function renderCharacterPicker(){
  const lesson = LESSON_LOOKUP[pendingLessonKey];
  if(!lesson) return;

  let html = `<button class="scene-back-btn" id="sceneBackBtn">← 戻る</button>
    <div class="scene-cat-title">${escapeHtml(lesson.locationLabel)} ・ ${escapeHtml(lesson.title)}</div>
    <div class="scene-cat-title" style="margin-top:2px;">誰と話す?</div>
    <div class="char-grid">`;
  Object.keys(CHARACTERS).forEach(id=>{
    const c = CHARACTERS[id];
    html += `<button class="char-card" data-id="${id}">
      <img class="char-avatar" src="${c.image}" alt="${escapeHtml(c.name)}" onerror="this.style.display='none'">
      <span class="char-name">${escapeHtml(c.name)}</span>
      <span class="char-tagline">${escapeHtml(c.tagline)}</span>
    </button>`;
  });
  html += `</div>`;
  sceneModalBody.innerHTML = html;

  document.getElementById('sceneBackBtn').addEventListener('click', renderSceneModal);
  sceneModalBody.querySelectorAll('.char-card').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      closeSceneModal();
      startScene(pendingLessonKey, btn.dataset.id);
    });
  });
}

function openSceneModal(){
  renderSceneModal();
  sceneModalOverlay.classList.add('open');
}
function closeSceneModal(){
  sceneModalOverlay.classList.remove('open');
}

async function startScene(lessonKey, characterId){
  const lesson = LESSON_LOOKUP[lessonKey];
  const character = CHARACTERS[characterId];
  if(!lesson || !character) return;

  currentScene = lesson;
  currentSceneKey = lessonKey;
  currentCharacter = character;
  currentCharacterId = characterId;
  sceneScore = 0;
  sceneCleared = false;
  history = [];
  chatEl.innerHTML='';
  window.speechSynthesis.cancel();
  sceneBanner.style.display = 'flex';
  sceneBannerLabel.textContent = '📚 ' + lesson.locationLabel + ' ・ ' + lesson.title + ' ・ ' + character.name;
  updateSceneScoreLabel();
  emptyHint.style.display = 'none';

  playSceneChime();
  addTyping();
  statusCaption.textContent = 'シーンを準備しています…';

  try{
    const kickoffMsgs = [{
      role:'user',
      content:'(システム指示:これは会話の最初のターンです。上で指定されたキャラクターとシーン設定に沿って、あなたの方から自然に話しかけて会話を始めてください。ユーザーはまだ何も発言していません。userSegmentsは空配列にし、needsCorrectionはfalseにしてください。)'
    }];
    const result = await callClaudeMessages(kickoffMsgs);
    removeTyping();
    statusCaption.textContent = '';

    const plainOpening = (result.reply || []).map(s=>s.text).join('');
    addAiMessage(result.reply || [{text:'こんにちは!',reading:null}], result.replyZh);
    history.push({role:'assistant', text: plainOpening});
    speak(plainOpening);
  }catch(e){
    removeTyping();
    statusCaption.textContent = '';
    console.error('シーン開始エラー:', e);
    addAiMessage(
      [{text:'あれ、エラーが出た: ' + (e.message || e), reading:null}],
      '除錯用的實際錯誤訊息(可以截圖給開發者看):' + (e.message || e)
    );
  }
}

function updateSceneScoreLabel(){
  sceneScoreLabel.textContent = '🌟 ' + Math.min(sceneScore, SCENE_TARGET_SCORE) + '/' + SCENE_TARGET_SCORE;
}

function showClearModal(){
  playSceneChime();
  const harderExists = Object.values(LESSON_LOOKUP).some(s => s.difficulty > (currentScene ? currentScene.difficulty : 0));
  clearModalText.textContent = harderExists
    ? 'このシーンのレッスンをクリアしたよ!もっと難しいシーンに挑戦する?それともこのまま話し続ける?'
    : 'このシーンのレッスンをクリアしたよ!すごいね!このまま自由に話し続けよう。';
  clearGoNextBtn.style.display = harderExists ? 'block' : 'none';
  clearModalOverlay.classList.add('open');
}
function hideClearModal(){
  clearModalOverlay.classList.remove('open');
}
clearGoNextBtn.addEventListener('click', ()=>{
  hideClearModal();
  openSceneModal();
});
clearStayBtn.addEventListener('click', hideClearModal);

// ---------- Word lookup popup ----------
document.addEventListener('click', (e)=>{
  const chip = e.target.closest('.word-chip');
  if(chip){
    const rect = chip.getBoundingClientRect();
    wordPopup.textContent = chip.dataset.meaning;
    wordPopup.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 160)) + 'px';
    wordPopup.style.top = Math.max(8, rect.top - 36) + 'px';
    wordPopup.style.display = 'block';
    e.stopPropagation();
  } else if(!e.target.closest('.word-popup')){
    wordPopup.style.display = 'none';
  }
});

function exitScene(){
  currentScene = null;
  currentSceneKey = '';
  currentCharacter = null;
  currentCharacterId = '';
  sceneScore = 0;
  sceneCleared = false;
  sceneBanner.style.display = 'none';
  history = [];
  chatEl.innerHTML = '';
  chatEl.appendChild(emptyHint);
  emptyHint.style.display = 'block';
  window.speechSynthesis.cancel();
}

sceneOpenBtn.addEventListener('click', openSceneModal);
sceneModalClose.addEventListener('click', closeSceneModal);
sceneModalOverlay.addEventListener('click', (e)=>{
  if(e.target === sceneModalOverlay) closeSceneModal();
});
sceneExitBtn.addEventListener('click', exitScene);

    html += `<button class="level-item${isSelected ? ' selected' : ''}" data-level="${key}">
      <span class="level-item-label">${escapeHtml(def.label)}</span>
      <span class="level-check">✓</span>
    </button>`;
  });
  levelModalBody.innerHTML = html;

      currentLevel = btn.dataset.level;
      levelOpenBtn.textContent = '📊 ' + LEVEL_DEFS[currentLevel].shortLabel;
      closeLevelModal();
    });

}

  levelModalOverlay.classList.add('open');
