<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>だるま日本語 - AI会話練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1B1B;
    --washi:#F7F0E3;
    --washi-card:#FFFBF2;
    --washi-dark:#EAE0C8;
    --indigo:#2B4570;
    --indigo-deep:#1B2C47;
    --vermillion:#C1440E;
    --vermillion-soft:#F6DCCB;
    --mustard:#E0A458;
    --line:#D8CBA6;
    --shadow: 0 2px 10px rgba(27,44,71,0.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 90% -10%, rgba(224,164,88,0.18), transparent 45%),
      radial-gradient(circle at -10% 110%, rgba(43,69,112,0.10), transparent 45%),
      var(--washi);
    color:var(--ink);
    font-family:'Noto Sans TC','Noto Sans JP',sans-serif;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .app{
    width:100%;
    max-width:720px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--washi-card);
    box-shadow:0 0 40px rgba(27,44,71,0.10);
    position:relative;
  }

  /* ---------- Header ---------- */
  header{
    padding:18px 20px 14px;
    background:var(--indigo-deep);
    color:var(--washi);
    border-bottom:4px solid var(--vermillion);
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size:14px 14px;
    pointer-events:none;
  }
  .header-top{display:flex; align-items:center; gap:14px; position:relative; z-index:1;}
  .title-block h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:22px; font-weight:900; margin:0; letter-spacing:1px;
    display:flex; align-items:baseline; gap:8px;
  }
  .title-block h1 small{
    font-family:'Noto Sans TC',sans-serif;
    font-size:11px; font-weight:400; color:var(--mustard); letter-spacing:2px;
  }
  .title-block p{margin:2px 0 0; font-size:12px; color:#C9D3E4; font-family:'Zen Kaku Gothic New',sans-serif;}

  .controls{
    display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; position:relative; z-index:1;
  }
  .controls select, .pill-btn{
    font-family:'Zen Kaku Gothic New','Noto Sans TC',sans-serif;
    font-size:12px;
    border:1px solid rgba(247,240,227,0.35);
    background:rgba(255,255,255,0.06);
    color:var(--washi);
    padding:6px 10px;
    border-radius:20px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .controls select{ padding-right:6px; }
  .pill-btn:hover, .controls select:hover{background:rgba(255,255,255,0.16);}
  .pill-btn.active{background:var(--mustard); color:var(--indigo-deep); border-color:var(--mustard); font-weight:700;}
  .pill-btn:active{transform:scale(0.96);}

  /* ---------- Daruma avatar ---------- */
  .avatar-wrap{
    display:flex; align-items:center; justify-content:center;
    padding:14px 0 6px;
    flex-shrink:0;
  }
  .daruma{ width:78px; height:78px; filter:drop-shadow(0 4px 6px rgba(0,0,0,0.15)); }
  .daruma .eye{ transform-origin:center; animation:blink 5.5s infinite; }
  .daruma .eye.right{ animation-delay:.15s; }
  @keyframes blink{
    0%,92%,100%{ ry:5; }
    95%{ ry:0.5; }
  }
  .daruma .mouth{ transition: d .12s ease; }
  .daruma.speaking .mouth{ animation:talk .28s infinite alternate; }
  @keyframes talk{
    from{ d:path("M -9 6 Q 0 6 9 6"); }
    to{ d:path("M -9 5 Q 0 16 9 5"); }
  }
  .status-caption{
    text-align:center; font-size:11px; color:var(--indigo); opacity:.7;
    font-family:'Zen Kaku Gothic New',sans-serif; margin-top:2px; height:14px;
  }

  /* ---------- Chat ---------- */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:10px 16px 16px;
    display:flex; flex-direction:column; gap:14px;
  }
  .msg{ max-width:82%; display:flex; flex-direction:column; gap:4px; animation:rise .25s ease; }
  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .msg.ai{ align-self:flex-start; }
  .msg.user{ align-self:flex-end; align-items:flex-end; }

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    line-height:1.9;
    font-size:16px;
    box-shadow:var(--shadow);
    word-break:break-word;
  }
  .msg.ai .bubble{
    background:var(--washi-dark);
    border-bottom-left-radius:4px;
    font-family:'Noto Sans JP',sans-serif;
  }
  .msg.user .bubble{
    background:var(--indigo);
    color:var(--washi);
    border-bottom-right-radius:4px;
    font-family:'Noto Sans JP',sans-serif;
  }
  ruby rt{
    font-size:10px; color:var(--indigo); font-family:'Noto Sans JP',sans-serif;
    transition:opacity .15s ease;
  }
  .msg.user ruby rt{ color:var(--mustard); }
  .app.no-furigana ruby rt{ display:none; }

  .zh-caption{
    font-size:12px; color:#9a8f6f; font-family:'Noto Sans TC',sans-serif; padding:0 8px;
    line-height:1.5;
  }

  /* correction card: always visible, styled like a native-speaker suggestion note */
  .correction-card{
    background:var(--washi-dark);
    border:1px solid var(--line);
    border-left:4px solid var(--mustard);
    border-radius:10px;
    padding:10px 14px;
    max-width:100%;
    box-shadow:var(--shadow);
  }
  .correction-card .label{
    font-size:11px; font-weight:700; color:#8a6a2a;
    font-family:'Zen Kaku Gothic New',sans-serif;
    display:flex; align-items:center; gap:4px; margin-bottom:4px;
  }
  .correction-card .corrected-jp{
    font-family:'Noto Sans JP',sans-serif; font-size:15.5px; line-height:1.9;
    color:var(--ink); display:block;
  }
  .correction-card .correction-explain{
    font-size:12px; color:#8a7f5f; font-family:'Noto Sans TC',sans-serif;
    margin-top:6px; padding-top:6px; border-top:1px dashed var(--line);
  }
  .correction-card ruby rt{ color:#8a6a2a; }

  .typing-dots{ display:flex; gap:4px; padding:6px 4px; }
  .typing-dots span{
    width:6px; height:6px; border-radius:50%; background:var(--indigo); opacity:.4;
    animation:bounce 1.1s infinite;
  }
  .typing-dots span:nth-child(2){ animation-delay:.15s; }
  .typing-dots span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{transform:translateY(0); opacity:.4;} 30%{transform:translateY(-4px); opacity:1;} }

  /* ---------- Input bar ---------- */
  .input-bar{
    display:flex; align-items:flex-end; gap:8px;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:var(--washi-dark);
    border-top:1px solid var(--line);
  }
  .input-bar textarea{
    flex:1; resize:none; border:1px solid var(--line); border-radius:14px;
    padding:10px 12px; font-size:15px; font-family:'Noto Sans JP','Noto Sans TC',sans-serif;
    max-height:100px; min-height:42px; background:var(--washi-card); color:var(--ink);
  }
  .input-bar textarea:focus{ outline:2px solid var(--indigo); outline-offset:1px; }
  .round-btn{
    width:42px; height:42px; border-radius:50%; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:transform .1s ease, background .15s ease;
  }
  .round-btn:active{ transform:scale(0.92); }
  .mic-btn{ background:var(--washi-card); border:1px solid var(--line); color:var(--indigo); }
  .mic-btn.recording{ background:var(--vermillion); color:#fff; animation:pulse 1s infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(193,68,14,0.45);} 100%{box-shadow:0 0 0 10px rgba(193,68,14,0);} }
  .send-btn{ background:var(--indigo); color:var(--washi); }
  .send-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .mic-btn svg, .send-btn svg{ width:18px; height:18px; }

  .empty-hint{
    text-align:center; color:#9a8f6f; font-size:13px; margin:auto; padding:30px 20px;
    font-family:'Zen Kaku Gothic New',sans-serif; line-height:1.8;
  }
  .empty-hint b{ color:var(--indigo); }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }
</style>
</head>
<body>
<div class="app" id="app">

  <header>
    <div class="header-top">
      <div class="title-block">
        <h1>だるま日本語 <small>DARUMA NIHONGO</small></h1>
        <p>七転び八起き ・ 説き間違えながら話そう</p>
      </div>
    </div>
    <div class="controls">
      <select id="levelSelect" title="程度を選ぶ">
        <option value="lv1">初級①(挨拶・基本文型)</option>
        <option value="lv2" selected>初級②(て形・過去形)</option>
        <option value="lv3">初級③(可能形・条件形)</option>
        <option value="free">自由(制限なし)</option>
      </select>
      <button class="pill-btn active" id="furiganaToggle">振り仮名 ON</button>
      <button class="pill-btn active" id="voiceToggle">音声 ON</button>
      <button class="pill-btn" id="resetBtn">会話をリセット</button>
    </div>
  </header>

  <div class="avatar-wrap">
    <svg class="daruma" id="daruma" viewBox="-40 -40 80 80">
      <ellipse cx="0" cy="6" rx="34" ry="30" fill="#C1440E"/>
      <path d="M -34 20 Q 0 40 34 20 L 34 8 Q 0 26 -34 8 Z" fill="#E0A458"/>
      <ellipse cx="0" cy="-2" rx="21" ry="20" fill="#FFFBF2"/>
      <path d="M -18 -14 Q 0 -24 18 -14" stroke="#1B1B1B" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <ellipse class="eye left" cx="-8" cy="-4" rx="3.4" ry="5" fill="#1B1B1B"/>
      <ellipse class="eye right" cx="8" cy="-4" rx="3.4" ry="5" fill="#1B1B1B"/>
      <path class="mouth" d="M -9 6 Q 0 6 9 6" stroke="#1B1B1B" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M -21 2 Q -25 6 -21 10" stroke="#C1440E" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55"/>
      <path d="M 21 2 Q 25 6 21 10" stroke="#C1440E" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55"/>
    </svg>
  </div>
  <div class="status-caption" id="statusCaption"></div>

  <div class="chat" id="chat">
    <div class="empty-hint" id="emptyHint">
      <b>だるまさん</b>と日本語で話してみよう。<br>
      文字でも、マイクで話しても大丈夫。<br>
      間違えても気にしないで、<b>意味は分かる</b>から自然に続けてね。
    </div>
  </div>

  <div class="input-bar">
    <button class="round-btn mic-btn" id="micBtn" title="音声入力">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <textarea id="textInput" rows="1" placeholder="日本語でメッセージを書いてね…"></textarea>
    <button class="round-btn send-btn" id="sendBtn" title="送信">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>

<script>
const chatEl = document.getElementById('chat');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const daruma = document.getElementById('daruma');
const statusCaption = document.getElementById('statusCaption');
const emptyHint = document.getElementById('emptyHint');
const appEl = document.getElementById('app');
const levelSelect = document.getElementById('levelSelect');
const furiganaToggle = document.getElementById('furiganaToggle');
const voiceToggle = document.getElementById('voiceToggle');
const resetBtn = document.getElementById('resetBtn');

if(window.location.protocol === 'file:'){
  emptyHint.innerHTML = '⚠️ 偵測到你是直接開啟本機檔案(file://)。<br>這個 App 需要透過網頁伺服器執行(例如部署到 Vercel 後的網址),直接雙擊開啟 HTML 檔案是無法連線後端 API 的。';
  emptyHint.style.color = '#C1440E';
}

let history = []; // {role:'user'|'assistant', text:'plain text'}
let furiganaOn = true;
let voiceOn = true;
let isProcessing = false;

const LEVELS = {
  lv1: "初級①:挨拶、です/ます体、基本的な名詞文・形容詞文、は/が/を/に/で などの基本助詞のみ。過去形やて形は使わない。語彙は「文化初級日本語」1〜2課相当の非常に基礎的なものに限る。",
  lv2: "初級②:です/ます体中心、て形(〜てください/〜ています)、普通の過去形(〜ました/〜でした)、形容詞の活用、比較表現。語彙は「文化初級日本語」2〜3巻相当。",
  lv3: "初級③:可能形、条件形(〜ば/〜たら/〜と)、意向形、簡単な受身、やり取り表現(あげる/もらう/くれる)まで含む。文化初級日本語3巻後半〜相当。",
  free: "レベル制限なし。自然な日本語(日常会話レベル、N3〜N2程度まで)で自由に話してよい。ただし難しい漢語や専門用語は避け、会話らしい自然さを優先する。"
};

function buildSystemPrompt(){
  return `あなたは「だるまさん」という、台湾人の日本語学習者と話す、温かくて励まし上手な日本語の会話パートナーです。
相手は台湾の大学生で、日本語を勉強中です。以下のルールを厳守してください。

【レベル設定】
${LEVELS[levelSelect.value]}

【会話の基本姿勢】
- 相手の日本語に文法・語彙の間違いがあっても、まず言いたいことを推測して理解し、自然に会話を続けること。会話が止まらないようにする。
- だるまさんらしく親しみやすく、時々励ましの言葉を交える。ただし説教くさくしない。
- 返信は1〜3文程度、短く自然な会話文にする。

【出力形式】
必ず次のJSON形式のみを出力すること。前置き、説明文、コードブロックの記号(バッククォート)は一切つけない。JSONのみ。

{
  "reply": [ {"text":"漢字や仮名の一部分","reading":"その部分の読み(ひらがな)か、読み不要ならnull"}, ... ],
  "replyZh": "replyの繁體中文訳(簡潔に、1文)",
  "correction": {
    "needsCorrection": true または false,
    "correctedSegments": [ {"text":"...","reading":"..."} , ... ],
    "explanationZh": "何が間違っていたかの簡潔な繁體中文解説、1文、句読点に——(em dash)は使わない(needsCorrectionがtrueの時のみ、無ければ空配列/空文字)"
  }
}

【reply配列・correctedSegments配列共通のルール】
- 全文を、漢字を含む意味の塊ごとに分割すること。漢字を含む部分には対応する読み(ひらがな)をreadingに入れる。ひらがな・カタカナ・句読点のみの部分はreading を null にする。
- 例: 「今日は暑いですね」→ [{"text":"今日","reading":"きょう"},{"text":"は","reading":null},{"text":"暑い","reading":"あつい"},{"text":"です","reading":null},{"text":"ね","reading":null}]

【correctionのルール】
- 相手のメッセージに明らかな文法・語彙・助詞の誤りがあり、教える価値がある場合のみ needsCorrection を true にし、correctedSegments に自然な日本語に直した相手の文を入れる。些細な口語表現の違いなどは true にしない。
- 誤りが無ければ needsCorrection は false にし、correctedSegments は空配列、explanationZh は空文字にする。`;
}

function scrollToBottom(){ chatEl.scrollTop = chatEl.scrollHeight; }

function renderRuby(segments){
  return segments.map(seg=>{
    if(seg.reading && seg.reading.trim()){
      return `<ruby>${escapeHtml(seg.text)}<rt>${escapeHtml(seg.reading)}</rt></ruby>`;
    }
    return escapeHtml(seg.text);
  }).join('');
}
function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addUserMessage(text){
  emptyHint.style.display='none';
  const wrap = document.createElement('div');
  wrap.className='msg user';
  const bubble = document.createElement('div');
  bubble.className='bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  scrollToBottom();
  return wrap;
}

function buildCorrectionCard(correction){
  const card = document.createElement('div');
  card.className='correction-card';
  card.innerHTML = `
    <div class="label">💡 正確な言い方</div>
    <span class="corrected-jp">${renderRuby(correction.correctedSegments || [])}</span>
    ${correction.explanationZh ? `<div class="correction-explain">${escapeHtml(correction.explanationZh)}</div>` : ''}
  `;
  return card;
}

function addAiMessage(segments, replyZh){
  emptyHint.style.display='none';
  const wrap = document.createElement('div');
  wrap.className='msg ai';
  const bubble = document.createElement('div');
  bubble.className='bubble';
  bubble.innerHTML = renderRuby(segments);
  wrap.appendChild(bubble);

  if(replyZh){
    const zh = document.createElement('div');
    zh.className='zh-caption';
    zh.textContent = replyZh;
    wrap.appendChild(zh);
  }
  chatEl.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

function addTyping(){
  const wrap = document.createElement('div');
  wrap.className='msg ai';
  wrap.id='typingIndicator';
  const bubble = document.createElement('div');
  bubble.className='bubble';
  bubble.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  scrollToBottom();
}
function removeTyping(){
  const el = document.getElementById('typingIndicator');
  if(el) el.remove();
}

async function callClaude(userText){
  const msgs = [];
  history.forEach(h=>{
    msgs.push({role: h.role, content: h.text});
  });
  msgs.push({role:'user', content:userText});

  let response;
  try{
    response = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: buildSystemPrompt(),
        messages: msgs
      })
    });
  }catch(networkErr){
    throw new Error("NETWORK_FAIL: " + networkErr.message);
  }

  const data = await response.json();

  if(!response.ok || data.error){
    const msg = (data.error && (data.error.message || data.error.type)) || ("HTTP " + response.status);
    throw new Error("API_ERROR: " + msg);
  }

  const textBlock = (data.content || []).find(c=>c.type==='text');
  if(!textBlock){
    throw new Error("NO_TEXT_BLOCK: " + JSON.stringify(data).slice(0,200));
  }
  let raw = textBlock.text;
  raw = raw.replace(/```json|```/g,'').trim();
  let parsed;
  try{
    parsed = JSON.parse(raw);
  }catch(e){
    parsed = {
      reply:[{text: raw || "すみません、もう一度言ってもらえますか？", reading:null}],
      replyZh:"",
      correction:{needsCorrection:false, correctedSegments:[], explanationZh:""}
    };
  }
  return parsed;
}

function speak(text){
  if(!voiceOn) return;
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.95;
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v=>v.lang && v.lang.startsWith('ja'));
  if(jaVoice) utter.voice = jaVoice;
  daruma.classList.add('speaking');
  statusCaption.textContent = '話しています…';
  utter.onend = ()=>{
    daruma.classList.remove('speaking');
    statusCaption.textContent='';
  };
  utter.onerror = ()=>{
    daruma.classList.remove('speaking');
    statusCaption.textContent='';
  };
  window.speechSynthesis.speak(utter);
}
// preload voices (some browsers need this)
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = ()=> window.speechSynthesis.getVoices();
}

async function handleSend(){
  const text = textInput.value.trim();
  if(!text || isProcessing) return;
  isProcessing = true;
  sendBtn.disabled = true;
  textInput.value='';
  autoResize();

  addUserMessage(text);

  addTyping();
  statusCaption.textContent = '考えています…';
  try{
    const result = await callClaude(text);
    removeTyping();

    if(result.correction && result.correction.needsCorrection && result.correction.correctedSegments && result.correction.correctedSegments.length){
      const card = buildCorrectionCard(result.correction);
      chatEl.appendChild(card);
      scrollToBottom();
    }

    const plainReply = (result.reply||[]).map(s=>s.text).join('');
    addAiMessage(result.reply || [{text:'…',reading:null}], result.replyZh);

    history.push({role:'user', text: text});
    history.push({role:'assistant', text: plainReply});

    statusCaption.textContent='';
    speak(plainReply);
  }catch(e){
    removeTyping();
    console.error('だるま日本語 API Error:', e);
    addAiMessage(
      [{text:'あれ、エラーが出た: ' + (e.message || e), reading:null}],
      '除錯用的實際錯誤訊息(可以截圖給開發者看):' + (e.message || e)
    );
    statusCaption.textContent='';
  }finally{
    isProcessing = false;
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', handleSend);
textInput.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    handleSend();
  }
});
function autoResize(){
  textInput.style.height='auto';
  textInput.style.height = Math.min(textInput.scrollHeight,100)+'px';
}
textInput.addEventListener('input', autoResize);

// ---------- Voice input ----------
let recognition = null;
let recognizing = false;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = ()=>{
    recognizing = true;
    micBtn.classList.add('recording');
    statusCaption.textContent = '聞いています…';
  };
  recognition.onresult = (e)=>{
    let transcript = '';
    for(let i=0;i<e.results.length;i++){
      transcript += e.results[i][0].transcript;
    }
    textInput.value = transcript;
    autoResize();
  };
  recognition.onerror = ()=>{
    statusCaption.textContent='';
  };
  recognition.onend = ()=>{
    recognizing = false;
    micBtn.classList.remove('recording');
    statusCaption.textContent='';
  };
  micBtn.addEventListener('click', ()=>{
    if(recognizing){
      recognition.stop();
    }else{
      window.speechSynthesis.cancel();
      recognition.start();
    }
  });
}else{
  micBtn.addEventListener('click', ()=>{
    statusCaption.textContent = 'このブラウザは音声入力に対応していません';
    setTimeout(()=> statusCaption.textContent='', 2500);
  });
}

// ---------- Toggles ----------
furiganaToggle.addEventListener('click', ()=>{
  furiganaOn = !furiganaOn;
  appEl.classList.toggle('no-furigana', !furiganaOn);
  furiganaToggle.textContent = '振り仮名 ' + (furiganaOn ? 'ON' : 'OFF');
  furiganaToggle.classList.toggle('active', furiganaOn);
});
voiceToggle.addEventListener('click', ()=>{
  voiceOn = !voiceOn;
  if(!voiceOn) window.speechSynthesis.cancel();
  voiceToggle.textContent = '音声 ' + (voiceOn ? 'ON' : 'OFF');
  voiceToggle.classList.toggle('active', voiceOn);
});
resetBtn.addEventListener('click', ()=>{
  history = [];
  chatEl.innerHTML='';
  chatEl.appendChild(emptyHint);
  emptyHint.style.display='block';
  window.speechSynthesis.cancel();
});
</script>
</body>
